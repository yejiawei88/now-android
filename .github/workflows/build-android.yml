name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: now-android/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets
        run: rustup target add aarch64-linux-android

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            unzip \
            wget \
            curl \
            git \
            file

      - name: Setup JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Download Android SDK Command Line Tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip

      - name: Install Android SDK components
        env:
          ANDROID_HOME: $HOME/android-sdk
          ANDROID_SDK_ROOT: $HOME/android-sdk
        run: |
          export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools"

          # Accept all licenses
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          # Install required components
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"

      - name: Setup Android environment
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "NDK_HOME=$HOME/android-sdk/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: ./now-android
        run: npm ci

      - name: Build frontend
        working-directory: ./now-android
        run: npm run build

      - name: Configure Cargo for Android cross-compilation
        working-directory: ./now-android/src-tauri
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'CARGOEOF'
          [target.aarch64-linux-android]
          ar = "llvm-ar"
          linker = "clang"
          CARGOEOF

      - name: Install Android target linker
        run: |
          export PATH="$PATH:$ANDROID_HOME/ndk/26.1.10909125/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Build Tauri Android
        working-directory: ./now-android
        env:
          ANDROID_HOME: $HOME/android-sdk
          ANDROID_SDK_ROOT: $HOME/android-sdk
          NDK_HOME: $HOME/android-sdk/ndk/26.1.10909125
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: clang
        run: |
          npm run tauri build -- --target aarch64-linux-android --bundles apk

      - name: Find built APK
        id: find-apk
        run: |
          APK_PATH=$(find now-android/src-tauri/target -name "*.apk" 2>/dev/null | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK path: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: now-android-apk
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 7
